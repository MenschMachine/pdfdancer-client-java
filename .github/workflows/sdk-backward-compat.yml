name: SDK Backward Compatibility Tests

on:
  repository_dispatch:
    types: [ api-preview-deployed ]

  workflow_dispatch:
    inputs:
      api_url:
        description: 'API base URL to test against'
        required: true
        type: string
      sdk_token:
        description: 'Non-secret test token; never enter production credentials'
        required: true
        type: string
        default: '42'

permissions:
  contents: read

jobs:
  get-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.tags.outputs.tags }}
    steps:
      - name: Fetch tags
        id: tags
        run: |
          TAGS=$(git ls-remote --tags https://github.com/MenschMachine/pdfdancer-client-java.git \
            | grep -v '\^{}' \
            | awk -F'/' '{print $NF}' \
            | grep '^v' \
            | sort -V \
            | tail -3 \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Last 3 SDK tags: $TAGS"

  test-compat:
    needs: get-tags
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        tag: ${{ fromJSON(needs.get-tags.outputs.tags) }}

    steps:
      - name: Checkout SDK at ${{ matrix.tag }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: MenschMachine/pdfdancer-client-java
          ref: ${{ matrix.tag }}
          path: sdk
          submodules: true

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Make gradlew executable
        run: chmod +x sdk/gradlew

      - name: Run tests
        working-directory: sdk
        run: ./gradlew test --no-daemon
        env:
          PDFDANCER_BASE_URL: ${{ github.event.client_payload.api_url || inputs.api_url }}
          PDFDANCER_API_TOKEN: ${{ github.event.client_payload.sdk_token || inputs.sdk_token }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-${{ matrix.tag }}
          path: |
            sdk/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7
