name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  build:
    # Run the minimal matrix for automatic non-main events.
    if: github.event_name != 'workflow_dispatch' && github.ref != 'refs/heads/main'

    permissions:
      contents: read
      issues: read
      pull-requests: read
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        java: [ 17 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          submodules: true

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Gradle wrapper
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-

      - name: Cache Gradle dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set Gradle version based on Java version
        id: gradle-version
        shell: bash
        run: |
          if [ "${{ matrix.java }}" = "25" ]; then
            echo "version=9.2.1" >> $GITHUB_OUTPUT
          else
            echo "version=8.10.2" >> $GITHUB_OUTPUT
          fi

      - name: Download and set up Gradle
        shell: bash
        run: |
          GRADLE_VERSION="${{ steps.gradle-version.outputs.version }}"
          cd gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" > gradle-wrapper.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Resolve API base URL
        id: resolve-api-base-url
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.PROPAGATE_TOKEN || github.token }}
          script: |
            const fallbackUrl = 'https://api-staging.pdfdancer.com';
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setOutput('base_url', fallbackUrl);
              return;
            }

            const body = pr.body || '';
            const apiPrMatch = body.match(/## Source API PR[\s\S]*?^\s+- Repository:\s*MenschMachine\/pdfdancer-api\s*$[\s\S]*?^\s+- PR:\s*#?(\d+)\s*$/im);
            if (!apiPrMatch) {
              core.info('No Source API PR block found in the PR body; using staging API.');
              core.setOutput('base_url', fallbackUrl);
              return;
            }

            const apiPrNumber = Number(apiPrMatch[1]);
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: 'MenschMachine',
              repo: 'pdfdancer-api',
              issue_number: apiPrNumber,
              per_page: 100,
            });
            const previewComments = comments.filter((comment) =>
              typeof comment.body === 'string' && comment.body.includes('### Preview Environment')
            );
            if (previewComments.length === 0) {
              core.setFailed(`Source API PR #${apiPrNumber} is referenced by this PR, but no preview comment was found.`);
              return;
            }

            const previewComment = previewComments[previewComments.length - 1];
            const urlMatch = previewComment.body.match(/\*\*API URL:\*\*\s*(https?:\/\/\S+)/);
            if (!urlMatch) {
              core.setFailed(`Preview comment on source API PR #${apiPrNumber} does not contain a parseable API URL.`);
              return;
            }

            core.info(`Using preview API URL from source API PR #${apiPrNumber}: ${urlMatch[1]}`);
            core.setOutput('base_url', urlMatch[1]);

      - name: Run build
        run: ./gradlew build
        env:
          PDFDANCER_BASE_URL: ${{ steps.resolve-api-base-url.outputs.base_url }}
          PDFDANCER_API_TOKEN: 42

      - name: Upload build reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: build-reports-${{ github.run_number }}-ubuntu-jdk17
          path: |
            build/reports/
            build/test-results/
          if-no-files-found: ignore
          retention-days: 7

  build-full-matrix:
    # Run the full matrix on main and for every manual dispatch.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    permissions:
      contents: read
      issues: read
      pull-requests: read
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        java: [ 17, 21, 25 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          submodules: true

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Gradle wrapper
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-

      - name: Cache Gradle dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set Gradle version based on Java version
        id: gradle-version
        shell: bash
        run: |
          if [ "${{ matrix.java }}" = "25" ]; then
            echo "version=9.2.1" >> $GITHUB_OUTPUT
          else
            echo "version=8.10.2" >> $GITHUB_OUTPUT
          fi

      - name: Download and set up Gradle
        shell: bash
        run: |
          GRADLE_VERSION="${{ steps.gradle-version.outputs.version }}"
          cd gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" > gradle-wrapper.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Run build
        if: runner.os != 'Windows'
        run: ./gradlew build
        env:
          PDFDANCER_BASE_URL: https://api-staging.pdfdancer.com
          PDFDANCER_API_TOKEN: 42

      - name: Run build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: gradlew.bat build
        env:
          PDFDANCER_BASE_URL: https://api-staging.pdfdancer.com
          PDFDANCER_API_TOKEN: 42

      - name: Collect PDF artifacts
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p build/pdf-artifacts
          cp /tmp/*.pdf build/pdf-artifacts/ 2>/dev/null || true

      - name: Collect PDF artifacts (Windows)
        if: always() && runner.os == 'Windows'
        shell: cmd
        run: |
          mkdir build\pdf-artifacts 2>nul
          copy %TEMP%\*.pdf build\pdf-artifacts\ 2>nul || exit 0

      - name: Upload test reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: test-reports-${{ github.run_number }}-${{ matrix.os }}-jdk${{ matrix.java }}
          path: |
            build/reports/
            build/test-results/
            build/pdf-artifacts/
          if-no-files-found: ignore
          retention-days: 7
