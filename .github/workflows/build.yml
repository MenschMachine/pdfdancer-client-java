name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  build:
    # run the minimal matrix on non-main branches
    if: github.ref != 'refs/heads/main'

    permissions:
      contents: read
      issues: read
      pull-requests: read
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        java: [ 11 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set Gradle version based on Java version
        id: gradle-version
        shell: bash
        run: |
          if [ "${{ matrix.java }}" = "11" ]; then
            echo "version=8.5" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.java }}" = "25" ]; then
            echo "version=9.2.1" >> $GITHUB_OUTPUT
          else
            echo "version=8.10.2" >> $GITHUB_OUTPUT
          fi

      - name: Download and set up Gradle
        shell: bash
        run: |
          GRADLE_VERSION="${{ steps.gradle-version.outputs.version }}"
          cd gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" > gradle-wrapper.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Resolve API base URL
        id: resolve-api-base-url
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROPAGATE_TOKEN }}
          script: |
            const fallbackUrl = 'https://api-staging.pdfdancer.com';
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setOutput('base_url', fallbackUrl);
              return;
            }

            const body = pr.body || '';
            const apiPrMatch = body.match(/## Source API PR[\s\S]*?^\s+- Repository:\s*MenschMachine\/pdfdancer-api\s*$[\s\S]*?^\s+- PR:\s*#?(\d+)\s*$/im);
            if (!apiPrMatch) {
              core.info('No Source API PR block found in the PR body; using staging API.');
              core.setOutput('base_url', fallbackUrl);
              return;
            }

            const apiPrNumber = Number(apiPrMatch[1]);
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: 'MenschMachine',
              repo: 'pdfdancer-api',
              issue_number: apiPrNumber,
              per_page: 100,
            });
            const previewComments = comments.filter((comment) =>
              typeof comment.body === 'string' && comment.body.includes('### Preview Environment')
            );
            if (previewComments.length === 0) {
              core.setFailed(`Source API PR #${apiPrNumber} is referenced by this PR, but no preview comment was found.`);
              return;
            }

            const previewComment = previewComments[previewComments.length - 1];
            const urlMatch = previewComment.body.match(/\*\*API URL:\*\*\s*(https?:\/\/\S+)/);
            if (!urlMatch) {
              core.setFailed(`Preview comment on source API PR #${apiPrNumber} does not contain a parseable API URL.`);
              return;
            }

            core.info(`Using preview API URL from source API PR #${apiPrNumber}: ${urlMatch[1]}`);
            core.setOutput('base_url', urlMatch[1]);

      - name: Run build
        run: ./gradlew build
        env:
          PDFDANCER_BASE_URL: ${{ steps.resolve-api-base-url.outputs.base_url }}
          PDFDANCER_API_TOKEN: 42

      - name: Upload build reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-reports-${{ github.run_number }}-ubuntu-jdk11
          path: |
            build/reports/
            build/test-results/
          retention-days: 7

  build-full-matrix:
    # run the full matrix only on main
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      issues: read
      pull-requests: read
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        java: [ 11, 17, 21, 25 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set Gradle version based on Java version
        id: gradle-version
        shell: bash
        run: |
          if [ "${{ matrix.java }}" = "11" ]; then
            echo "version=8.5" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.java }}" = "25" ]; then
            echo "version=9.2.1" >> $GITHUB_OUTPUT
          else
            echo "version=8.10.2" >> $GITHUB_OUTPUT
          fi

      - name: Download and set up Gradle
        shell: bash
        run: |
          GRADLE_VERSION="${{ steps.gradle-version.outputs.version }}"
          cd gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" > gradle-wrapper.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Resolve API base URL
        id: resolve-api-base-url
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROPAGATE_TOKEN }}
          script: |
            core.setOutput('base_url', 'https://api-staging.pdfdancer.com');

      - name: Run build
        if: runner.os != 'Windows'
        run: ./gradlew build
        env:
          PDFDANCER_BASE_URL: ${{ steps.resolve-api-base-url.outputs.base_url }}
          PDFDANCER_API_TOKEN: 42

      - name: Run build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: gradlew.bat build
        env:
          PDFDANCER_BASE_URL: ${{ steps.resolve-api-base-url.outputs.base_url }}
          PDFDANCER_API_TOKEN: 42

      - name: Collect PDF artifacts
        if: always()
        shell: bash
        run: |
          mkdir -p build/pdf-artifacts
          cp /tmp/*.pdf build/pdf-artifacts/ 2>/dev/null || true

      - name: Collect PDF artifacts (Windows)
        if: always() && runner.os == 'Windows'
        shell: cmd
        run: |
          mkdir build\pdf-artifacts 2>nul
          copy %TEMP%\*.pdf build\pdf-artifacts\ 2>nul || exit 0

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports-${{ github.run_number }}-${{ matrix.os }}-jdk${{ matrix.java }}
          path: |
            build/reports/
            build/test-results/
            build/pdf-artifacts/
          retention-days: 3
