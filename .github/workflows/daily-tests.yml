name: Daily Tests

on:
  schedule:
    # Run daily at 17:04 UTC
    - cron: '4 17 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  daily-test:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        java: [ 17, 21, 25 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Gradle wrapper
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-

      - name: Cache Gradle dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set Gradle version based on Java version
        id: gradle-version
        shell: bash
        run: |
          if [ "${{ matrix.java }}" = "25" ]; then
            echo "version=9.2.1" >> $GITHUB_OUTPUT
          else
            echo "version=8.10.2" >> $GITHUB_OUTPUT
          fi

      - name: Download and set up Gradle
        shell: bash
        run: |
          GRADLE_VERSION="${{ steps.gradle-version.outputs.version }}"
          cd gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" > gradle-wrapper.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Run build and tests
        if: runner.os != 'Windows'
        run: ./gradlew build
        env:
          PDFDANCER_BASE_URL: https://api-staging.pdfdancer.com
          PDFDANCER_API_TOKEN: 42

      - name: Run build and tests (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: gradlew.bat build
        env:
          PDFDANCER_BASE_URL: https://api-staging.pdfdancer.com
          PDFDANCER_API_TOKEN: 42

      - name: Collect PDF artifacts
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p build/pdf-artifacts
          cp /tmp/*.pdf build/pdf-artifacts/ 2>/dev/null || true

      - name: Collect PDF artifacts (Windows)
        if: always() && runner.os == 'Windows'
        shell: cmd
        run: |
          mkdir build\pdf-artifacts 2>nul
          copy %TEMP%\*.pdf build\pdf-artifacts\ 2>nul || exit 0

      - name: Upload test reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: test-reports-${{ github.run_number }}-${{ matrix.os }}-jdk${{ matrix.java }}
          path: |
            build/reports/
            build/test-results/
            build/pdf-artifacts/
          if-no-files-found: ignore
          retention-days: 7

  notify:
    needs: daily-test
    runs-on: ubuntu-latest
    if: always() && needs.daily-test.result == 'failure'
    permissions:
      contents: read
    steps:
      - name: Summarize failure
        run: |
          echo "## Daily Tests Failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Java SDK daily tests failed on $(date -u +%F)." >> "$GITHUB_STEP_SUMMARY"
          echo "[Open workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
