name: Run Specific Test

on:
  workflow_dispatch:
    inputs:
      test:
        description: 'Test to run (e.g., TextLineTest, PDFAssertionsTest.testAssertPageCount)'
        required: true
        type: string
      java_version:
        description: 'Java version'
        required: false
        default: '17'
        type: choice
        options:
          - '17'
          - '21'
          - '25'
      os:
        description: 'Operating system'
        required: false
        default: 'ubuntu-latest'
        type: choice
        options:
          - 'ubuntu-latest'
          - 'windows-latest'

jobs:
  test:
    permissions:
      contents: read
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          submodules: true

      - name: Set up JDK ${{ inputs.java_version }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: ${{ inputs.java_version }}
          distribution: 'temurin'

      - name: Cache Gradle wrapper
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-wrapper-

      - name: Cache Gradle dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set Gradle version based on Java version
        id: gradle-version
        shell: bash
        run: |
          if [ "${{ inputs.java_version }}" = "25" ]; then
            echo "version=9.2.1" >> $GITHUB_OUTPUT
          else
            echo "version=8.10.2" >> $GITHUB_OUTPUT
          fi

      - name: Download and set up Gradle
        shell: bash
        run: |
          GRADLE_VERSION="${{ steps.gradle-version.outputs.version }}"
          cd gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" > gradle-wrapper.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Run test
        if: runner.os != 'Windows'
        run: ./gradlew test --tests "${{ inputs.test }}"
        env:
          PDFDANCER_BASE_URL: https://api-staging.pdfdancer.com
          PDFDANCER_TOKEN: 42

      - name: Run test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: gradlew.bat test --tests "${{ inputs.test }}"
        env:
          PDFDANCER_BASE_URL: https://api-staging.pdfdancer.com
          PDFDANCER_TOKEN: 42

      - name: Collect PDF artifacts
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p build/pdf-artifacts
          cp /tmp/*.pdf build/pdf-artifacts/ 2>/dev/null || true

      - name: Collect PDF artifacts (Windows)
        if: always() && runner.os == 'Windows'
        shell: cmd
        run: |
          mkdir build\pdf-artifacts 2>nul
          copy %TEMP%\*.pdf build\pdf-artifacts\ 2>nul || exit 0

      - name: Upload test reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            build/reports/tests/
            build/test-results/
            build/pdf-artifacts/
          retention-days: 1
